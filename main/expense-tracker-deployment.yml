apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: expense-tracker-data
  namespace: services
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: expense-tracker
  namespace: services
  labels:
    app: expense-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: expense-tracker
  template:
    metadata:
      labels:
        app: expense-tracker
    spec:
      containers:
        - name: expense-tracker
          image: plamencode/expense-tracker:8
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - secretRef:
                name: expense-tracker-auth
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOST
              value: "0.0.0.0"
            - name: DB_PATH
              value: /data/expense-tracker.db
            - name: TZ
              value: Europe/Sofia
          volumeMounts:
            - name: expense-tracker-data
              mountPath: /data
          resources:
            requests:
              cpu: 20m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: expense-tracker-data
          persistentVolumeClaim:
            claimName: expense-tracker-data
