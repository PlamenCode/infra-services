apiVersion: v1
kind: ServiceAccount
metadata:
  name: prom-kubelet-scrape
  namespace: monitoring
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prom-kubelet-scrape
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prom-kubelet-scrape
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prom-kubelet-scrape
subjects:
  - kind: ServiceAccount
    name: prom-kubelet-scrape
    namespace: monitoring