apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-services
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/plamencode/infra-services.git
    targetRevision: main
    path: main

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true